<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Similarity Search</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Image Similarity Search</h1>
      <p class="subtitle">Upload a product image to find visually similar items.</p>

      <section id="drop-zone" class="drop-zone">
        <input id="file-input" type="file" accept="image/*" />
        <p>Drag & drop image here or click to select</p>
      </section>

      <section class="controls">
        <label for="threshold-slider">Similarity threshold: <span id="threshold-value">0.70</span></label>
        <input id="threshold-slider" type="range" min="0" max="1" step="0.01" value="0.7" />
        <button id="search-btn">Search Similar Images</button>
      </section>

      <section class="preview-section">
        <h2>Preview</h2>
        <img id="preview" alt="Selected image preview" />
      </section>

      <section>
        <div id="loading" class="loading hidden">Searching...</div>
        <p id="message" class="message"></p>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
